<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>B站 AI 过滤首页集成测试</title>
</head>
<body>
  <div class="bili-video-card" id="matched-card">
    <a class="bili-video-card__info--tit" href="https://www.bilibili.com/video/BV1Matched01" title="擦边标题示例">擦边标题示例</a>
    <a class="bili-video-card__info--author" href="https://space.bilibili.com/10001">目标 UP</a>
  </div>

  <div class="bili-video-card" id="matched-card-2">
    <a class="bili-video-card__info--tit" href="https://www.bilibili.com/video/BV1Matched02" title="第二个擦边标题">第二个擦边标题</a>
    <a class="bili-video-card__info--author" href="https://space.bilibili.com/10001">目标 UP</a>
  </div>

  <div class="bili-video-card" id="matched-card-3">
    <a class="bili-video-card__info--tit" href="https://www.bilibili.com/video/BV1Matched03" title="第三个擦边标题">第三个擦边标题</a>
    <a class="bili-video-card__info--author" href="https://space.bilibili.com/10001">目标 UP</a>
  </div>

  <div class="bili-video-card" id="same-up-card">
    <a class="bili-video-card__info--tit" href="https://www.bilibili.com/video/BV1SameUp002" title="普通标题但来自同一 UP">普通标题但来自同一 UP</a>
    <a class="bili-video-card__info--author" href="https://space.bilibili.com/10001">目标 UP</a>
  </div>

  <div class="bili-video-card" id="safe-card">
    <a class="bili-video-card__info--tit" href="https://www.bilibili.com/video/BV1Safe00003" title="正常科普视频">正常科普视频</a>
    <a class="bili-video-card__info--author" href="https://space.bilibili.com/20002">正常 UP</a>
  </div>

  <div class="bili-video-card" id="manual-dislike-card">
    <a class="bili-video-card__info--tit" href="https://www.bilibili.com/video/BV1Manual005" title="让用户主动标记的视频">让用户主动标记的视频</a>
    <a class="bili-video-card__info--author" href="https://space.bilibili.com/40004">手动样本 UP</a>
  </div>

  <div class="bili-video-card" id="pending-manual-card">
    <a class="bili-video-card__info--tit" href="https://www.bilibili.com/video/BV1Pending009" title="暂停期间待补学视频">暂停期间待补学视频</a>
    <a class="bili-video-card__info--author" href="https://space.bilibili.com/90009">待补学 UP</a>
  </div>

  <div class="bili-video-card" id="local-black-card">
    <a class="bili-video-card__info--tit" href="https://www.bilibili.com/video/BV1Local006" title="本地屏蔽规则测试">本地屏蔽规则测试</a>
    <a class="bili-video-card__info--author" href="https://space.bilibili.com/60006">本地规则 UP</a>
  </div>

  <div class="bili-video-card" id="title-white-card">
    <a class="bili-video-card__info--tit" href="https://www.bilibili.com/video/BV1White007" title="擦边但属于白名单例外">擦边但属于白名单例外</a>
    <a class="bili-video-card__info--author" href="https://space.bilibili.com/70007">标题白名单 UP</a>
  </div>

  <div class="bili-video-card" id="up-white-card">
    <a class="bili-video-card__info--tit" href="https://www.bilibili.com/video/BV1White008" title="擦边但来自白名单 UP">擦边但来自白名单 UP</a>
    <a class="bili-video-card__info--author" href="https://space.bilibili.com/50005">白名单 UP</a>
  </div>

  <div class="bili-video-card" id="special-av-card" data-aid="116921425004164">
    <a class="bili-video-card__info--tit" href="https://www.bilibili.com/video/av116921425004164" title="旧式 AV 链接与悬停预览测试">旧式 AV 链接与悬停预览测试</a>
    <a class="bili-video-card__info--author" href="https://space.bilibili.com/3546929837377927">特殊卡片 UP</a>
    <span id="special-preview-host"></span>
  </div>

  <div id="baf-test-result">PENDING</div>

  <script>
    window.__BAF_FORCE_HOMEPAGE__ = true;
    const store = new Map([
      ["baf.settings.v1", JSON.stringify({
        schemaVersion: 1,
        enabled: true,
        monitoringPaused: true,
        description: "擦边内容",
        provider: "deepseek",
        models: {
          deepseek: "deepseek-v4-flash",
          aihubmix: "gpt-4o-mini"
        }
      })],
      ["baf.secret.v1", JSON.stringify({
        schemaVersion: 1,
        keys: { deepseek: "test-key", aihubmix: "" }
      })],
      ["baf.blacklist.v1", JSON.stringify({ schemaVersion: 1, entries: {} })],
      ["baf.learning.v1", JSON.stringify({
        schemaVersion: 2,
        samples: {},
        learnedProfile: "",
        updatedAt: ""
      })],
      ["baf.rules.v1", JSON.stringify({
        schemaVersion: 3,
        titleBlacklist: ["本地屏蔽"],
        titleWhitelist: ["白名单例外"],
        upWhitelist: {
          "50005": {
            uid: "50005",
            name: "白名单 UP",
            addedAt: "2026-07-14T00:00:00.000Z"
          }
        },
        pendingSuggestions: { blacklist: [], whitelist: [] }
      })],
      ["baf.ai-cache.v1", JSON.stringify({
        schemaVersion: 3,
        entries: {},
        ignoredUpSuggestions: {}
      })]
    ]);

    const evaluatedTitles = [];
    let truncatedResponseSent = false;
    let firstClassificationBudget = 0;
    let recoveryRequestCount = 0;
    let learningRequestCount = 0;
    let firstLearningBudget = 0;
    let recoveryLearningBudget = 0;
    let deferredLearningAttempts = 0;

    const specialPreviewRoot = document.querySelector("#special-preview-host").attachShadow({ mode: "open" });
    specialPreviewRoot.innerHTML = '<span id="special-preview-overlay">悬停预览覆盖层</span>';

    window.GM_getValue = (key, fallback) => store.has(key) ? store.get(key) : fallback;
    window.GM_setValue = (key, value) => store.set(key, value);
    window.GM_registerMenuCommand = () => {};
    window.GM_xmlhttpRequest = (options) => {
      const request = JSON.parse(options.data);
      const userPayload = JSON.parse(request.messages[1].content);
      if (userPayload.dislikedVideo) {
        if (userPayload.dislikedVideo.title.includes("待补学")) {
          deferredLearningAttempts += 1;
          if (deferredLearningAttempts === 1) {
            setTimeout(() => options.onload({
              status: 429,
              responseText: JSON.stringify({ error: { message: "deferred learning test" } })
            }), 20);
            return;
          }
          setTimeout(() => options.onload({
            status: 200,
            responseText: JSON.stringify({
              choices: [{
                finish_reason: "stop",
                message: { content: JSON.stringify({
                  analysis: "恢复后补充分析暂停期间保存的样本",
                  traits: ["待补学样本"],
                  learnedProfile: "过滤与手动不喜欢样本及待补学样本特征相似的视频"
                }) }
              }]
            })
          }), 20);
          return;
        }
        learningRequestCount += 1;
        if (learningRequestCount === 1) {
          firstLearningBudget = request.max_tokens;
          setTimeout(() => options.onload({
            status: 200,
            responseText: JSON.stringify({
              choices: [{
                finish_reason: "length",
                message: { content: "" }
              }],
              usage: { completion_tokens: request.max_tokens }
            })
          }), 20);
          return;
        }
        recoveryLearningBudget = request.max_tokens;
        setTimeout(() => options.onload({
          status: 200,
          responseText: JSON.stringify({
            choices: [{
              finish_reason: "stop",
              message: { content: JSON.stringify({
                summary: "用户不喜欢该类主动标记的视频",
                features: ["主动标记样本"],
                learned_profile: "过滤与手动不喜欢样本特征相似的视频"
              }) }
            }]
          })
        }), 20);
        return;
      }
      if (userPayload.items.some((item) => item.title.includes("接口失败"))) {
        setTimeout(() => options.onload({
          status: 429,
          responseText: JSON.stringify({ error: { message: "rate limited" } })
        }), 20);
        return;
      }
      evaluatedTitles.push(...userPayload.items.map((item) => item.title));
      if (!truncatedResponseSent) {
        truncatedResponseSent = true;
        firstClassificationBudget = request.max_tokens;
        setTimeout(() => options.onload({
          status: 200,
          responseText: JSON.stringify({
            choices: [{
              finish_reason: "length",
              message: { content: "" }
            }],
            usage: { completion_tokens: request.max_tokens }
          })
        }), 20);
        return;
      }
      if (request.max_tokens > firstClassificationBudget) {
        recoveryRequestCount += 1;
      }
      const results = userPayload.items.map((item) => ({
        id: item.id,
        match: item.title.includes("擦边"),
        confidence: item.title.includes("擦边") ? 0.96 : 0.12,
        reason: item.title.includes("擦边") ? "命中测试描述" : "不匹配"
      }));
      setTimeout(() => options.onload({
        status: 200,
        responseText: JSON.stringify({
          choices: [{
            finish_reason: "stop",
            message: { content: JSON.stringify({ results }) }
          }]
        })
      }), 20);
    };
  </script>
  <script src="../bilibili-ai-up-filter.user.js"></script>
  <script>
    setTimeout(() => {
      const persisted = JSON.parse(store.get("baf.settings.v1"));
      window.__initialPause = {
        noAutomaticAi: evaluatedTitles.length === 0 && learningRequestCount === 0,
        localRuleStillWorks: document.querySelector("#local-black-card").classList.contains("baf-hidden"),
        pausedLabelVisible: document.querySelector("#baf-toggle").textContent.includes("已暂停"),
        resumeIconVisible: document.querySelector("#baf-monitor-toggle").textContent === "▶",
        persisted: persisted.monitoringPaused === true
      };
      document.querySelector("#baf-monitor-toggle").click();
    }, 100);

    setTimeout(() => {
      const savedBefore = JSON.parse(store.get("baf.blacklist.v1"));
      window.__bafPreBlock = {
        noAutoBlacklist: !savedBefore.entries["10001"],
        sameUpVisible: !document.querySelector("#same-up-card").classList.contains("baf-hidden"),
        suggestionVisible: document.querySelector("#baf-up-suggestions").textContent.includes("是否拉黑")
      };
      document.querySelector("#baf-up-suggestions button")?.click();
    }, 750);

    setTimeout(() => {
      window.__classificationAtManualPause = evaluatedTitles.length;
      document.querySelector("#baf-monitor-toggle").click();
    }, 1050);

    setTimeout(() => {
      const previewOverlay = specialPreviewRoot.querySelector("#special-preview-overlay");
      previewOverlay.dispatchEvent(new MouseEvent("contextmenu", {
        bubbles: true,
        cancelable: true,
        composed: true,
        clientX: 35,
        clientY: 35
      }));
      window.__specialAvContextMenu = {
        visible: document.querySelector("#baf-context-menu").classList.contains("baf-visible"),
        dislikeEnabled: !document.querySelector("#baf-dislike").disabled,
        dislikeLabel: document.querySelector("#baf-dislike").textContent
      };
      document.body.dispatchEvent(new MouseEvent("pointerdown", { bubbles: true }));
    }, 1120);

    setTimeout(() => {
      const manualCard = document.querySelector("#manual-dislike-card");
      manualCard.dispatchEvent(new MouseEvent("contextmenu", {
        bubbles: true,
        cancelable: true,
        clientX: 40,
        clientY: 40
      }));
      document.querySelector("#baf-dislike").click();
    }, 1200);

    setTimeout(() => {
      const pendingCard = document.querySelector("#pending-manual-card");
      pendingCard.dispatchEvent(new MouseEvent("contextmenu", {
        bubbles: true,
        cancelable: true,
        clientX: 50,
        clientY: 50
      }));
      document.querySelector("#baf-dislike").click();
    }, 1280);

    setTimeout(() => {
      const savedLearning = JSON.parse(store.get("baf.learning.v1"));
      window.__pausedLearning = {
        manualLearningCompleted: learningRequestCount === 2
          && Boolean(savedLearning.samples.BV1Manual005?.analyzedAt),
        homepageAiStillPaused: evaluatedTitles.length === window.__classificationAtManualPause,
        sampleSaved: Boolean(savedLearning.samples.BV1Manual005),
        pendingSampleSaved: Boolean(savedLearning.samples.BV1Pending009),
        pendingSampleWaiting: !savedLearning.samples.BV1Pending009?.analyzedAt
          && deferredLearningAttempts === 1,
        resumeIconVisible: document.querySelector("#baf-monitor-toggle").textContent === "▶",
        persistedPaused: JSON.parse(store.get("baf.settings.v1")).monitoringPaused === true
      };
      document.querySelector("#baf-monitor-toggle").click();
    }, 1380);

    setTimeout(() => {
      window.__cacheSafeCountBefore = evaluatedTitles
        .filter((title) => title === "正常科普视频").length;
      document.querySelector("#safe-card").remove();
      const replacement = document.createElement("div");
      replacement.className = "bili-video-card";
      replacement.id = "safe-card-reloaded";
      replacement.innerHTML = `
        <a class="bili-video-card__info--tit" href="https://www.bilibili.com/video/BV1Safe00003" title="正常科普视频">正常科普视频</a>
        <a class="bili-video-card__info--author" href="https://space.bilibili.com/20002">正常 UP</a>
      `;
      document.body.appendChild(replacement);
    }, 1900);

    setTimeout(() => {
      const failedCard = document.createElement("div");
      failedCard.className = "bili-video-card";
      failedCard.id = "failed-api-card";
      failedCard.innerHTML = `
        <a class="bili-video-card__info--tit" href="https://www.bilibili.com/video/BV1Failed004" title="接口失败测试视频">接口失败测试视频</a>
        <a class="bili-video-card__info--author" href="https://space.bilibili.com/30003">故障测试 UP</a>
      `;
      document.body.appendChild(failedCard);
    }, 2500);

    setTimeout(() => {
      const matchedHidden = document.querySelector("#matched-card").classList.contains("baf-hidden");
      const sameUpHidden = document.querySelector("#same-up-card").classList.contains("baf-hidden");
      const safeVisible = !document.querySelector("#safe-card-reloaded").classList.contains("baf-hidden");
      const saved = JSON.parse(store.get("baf.blacklist.v1"));
      const blacklisted = Boolean(saved.entries["10001"]);
      const manuallyConfirmed = saved.entries["10001"]?.source === "manual";
      const failedApiVisible = !document.querySelector("#failed-api-card").classList.contains("baf-hidden");
      const failedApiNotBlacklisted = !saved.entries["30003"];
      const manualDislikeHidden = document.querySelector("#manual-dislike-card").classList.contains("baf-hidden");
      const manualUpNotBlacklisted = !saved.entries["40004"];
      const savedLearning = JSON.parse(store.get("baf.learning.v1"));
      const manualSampleSaved = Boolean(savedLearning.samples.BV1Manual005);
      const manualSampleAnalyzed = Boolean(savedLearning.samples.BV1Manual005?.analyzedAt);
      const pendingSampleAnalyzed = Boolean(savedLearning.samples.BV1Pending009?.analyzedAt)
        && deferredLearningAttempts === 2;
      const learnedProfileSaved = savedLearning.learnedProfile.includes("手动不喜欢样本");
      const localBlackHidden = document.querySelector("#local-black-card").classList.contains("baf-hidden");
      const titleWhiteVisible = !document.querySelector("#title-white-card").classList.contains("baf-hidden");
      const upWhiteVisible = !document.querySelector("#up-white-card").classList.contains("baf-hidden");
      const localRulesSkippedAi = !evaluatedTitles.includes("本地屏蔽规则测试")
        && !evaluatedTitles.includes("擦边但属于白名单例外")
        && !evaluatedTitles.includes("擦边但来自白名单 UP");
      const safeEvaluationCount = evaluatedTitles
        .filter((title) => title === "正常科普视频").length;
      const cacheReused = safeEvaluationCount === window.__cacheSafeCountBefore;
      const cachePersisted = Boolean(JSON.parse(store.get("baf.ai-cache.v1")).entries.BV1Safe00003);
      const noAutoBlacklistBeforeSuggestion = window.__bafPreBlock?.noAutoBlacklist
        && window.__bafPreBlock?.sameUpVisible
        && window.__bafPreBlock?.suggestionVisible;
      const adaptiveJsonRecovery = truncatedResponseSent
        && recoveryRequestCount === 1
        && firstClassificationBudget < 1200;
      const adaptiveLearningRecovery = learningRequestCount === 2
        && firstLearningBudget === 550
        && recoveryLearningBudget > firstLearningBudget;
      const specialAvContextMenuWorks = window.__specialAvContextMenu?.visible
        && window.__specialAvContextMenu?.dislikeEnabled
        && window.__specialAvContextMenu?.dislikeLabel.includes("不喜欢此视频");
      const pauseControlsAutomaticAi = window.__initialPause?.noAutomaticAi
        && window.__initialPause?.localRuleStillWorks
        && window.__initialPause?.pausedLabelVisible
        && window.__initialPause?.resumeIconVisible
        && window.__initialPause?.persisted
        && window.__pausedLearning?.manualLearningCompleted
        && window.__pausedLearning?.homepageAiStillPaused
        && window.__pausedLearning?.sampleSaved
        && window.__pausedLearning?.pendingSampleSaved
        && window.__pausedLearning?.pendingSampleWaiting
        && window.__pausedLearning?.resumeIconVisible
        && window.__pausedLearning?.persistedPaused
        && JSON.parse(store.get("baf.settings.v1")).monitoringPaused === false;
      const passed = matchedHidden
        && sameUpHidden
        && safeVisible
        && blacklisted
        && manuallyConfirmed
        && noAutoBlacklistBeforeSuggestion
        && failedApiVisible
        && failedApiNotBlacklisted
        && manualDislikeHidden
        && manualUpNotBlacklisted
        && manualSampleSaved
        && manualSampleAnalyzed
        && pendingSampleAnalyzed
        && learnedProfileSaved
        && localBlackHidden
        && titleWhiteVisible
        && upWhiteVisible
        && localRulesSkippedAi
        && cacheReused
        && cachePersisted
        && adaptiveJsonRecovery
        && adaptiveLearningRecovery
        && specialAvContextMenuWorks
        && pauseControlsAutomaticAi;
      const result = document.querySelector("#baf-test-result");
      result.textContent = passed ? "PASS" : "FAIL";
      result.dataset.details = JSON.stringify({
        matchedHidden,
        sameUpHidden,
        safeVisible,
        blacklisted,
        manuallyConfirmed,
        noAutoBlacklistBeforeSuggestion,
        failedApiVisible,
        failedApiNotBlacklisted,
        manualDislikeHidden,
        manualUpNotBlacklisted,
        manualSampleSaved,
        manualSampleAnalyzed,
        pendingSampleAnalyzed,
        learnedProfileSaved,
        localBlackHidden,
        titleWhiteVisible,
        upWhiteVisible,
        localRulesSkippedAi,
        cacheReused,
        cachePersisted,
        adaptiveJsonRecovery,
        adaptiveLearningRecovery,
        specialAvContextMenuWorks,
        pauseControlsAutomaticAi,
        recoveryRequestCount,
        firstClassificationBudget,
        learningRequestCount,
        firstLearningBudget,
        recoveryLearningBudget,
        deferredLearningAttempts,
        safeEvaluationCount
      });
    }, 3800);
  </script>
</body>
</html>
